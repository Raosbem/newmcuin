services:

  # ── Base de datos ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: autopartes
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      retries: 5

  # ── API FastAPI ───────────────────────────────────────────────────────────
  api:
    build: ./autopartes-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/autopartes
      SECRET_KEY: super-secret-key-for-jwt-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend Flask (personal interno: staff/admin) ────────────────────────
  flask:
    build: ./autopartes-flask
    ports:
      - "5000:5000"
    environment:
      API_URL: http://api:8000/api/v1
      SECRET_KEY: flask-secret-key-2024
    depends_on:
      - api

  # ── Frontend Laravel (clientes externos) ─────────────────────────────────
  laravel:
    build: ./autopartes-laravel
    ports:
      - "8080:80"
    environment:
      APP_NAME: AutoPartes
      APP_ENV: local
      APP_KEY: base64:kJ5dNvTtKJBspXJDOdBptXMxR3U8pFHEi3Z2Vh8XFLA=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      API_URL: http://api:8000/api/v1
      SESSION_DRIVER: file
      CACHE_STORE: file
    depends_on:
      - api

volumes:
  pg_data:
