{% extends "base.html" %}
{% block title %}{{ action }} Marca — Admin{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('brands_index') }}" class="btn btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h3 class="fw-bold mb-0">
    <i class="bi bi-tag-fill me-2 text-warning"></i>{{ action }} Marca
  </h3>
</div>

<div class="card border-0 shadow-sm" style="max-width: 400px;">
  <div class="card-body p-4">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">
          Nombre <span class="text-danger">*</span>
        </label>
        <input type="text" name="name" class="form-control" required
               value="{{ brand.name if brand else '' }}"
               placeholder="Ej: Bosch, NGK, Gates…">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning fw-semibold">
          <i class="bi bi-check-lg me-1"></i>{{ action }}
        </button>
        <a href="{{ url_for('brands_index') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
