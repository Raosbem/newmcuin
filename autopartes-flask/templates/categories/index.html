{% extends "base.html" %}
{% block title %}Categorías — Admin{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="d-flex align-items-center gap-2">
    <a href="{{ url_for('parts_index') }}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h3 class="fw-bold mb-0">
      <i class="bi bi-grid-fill me-2 text-warning"></i>Gestión de Categorías
    </h3>
  </div>
  <a href="{{ url_for('categories_create') }}" class="btn btn-warning fw-semibold">
    <i class="bi bi-plus-circle me-1"></i>Nueva Categoría
  </a>
</div>

<div class="card border-0 shadow-sm" style="max-width: 600px;">
  <div class="card-body p-0">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-dark">
        <tr>
          <th class="ps-3">Nombre</th>
          <th class="text-end pe-3">Acciones</th>
        </tr>
      </thead>
      <tbody>
        {% for c in categories %}
        <tr>
          <td class="ps-3 fw-semibold">{{ c.name }}</td>
          <td class="text-end pe-3">
            <a href="{{ url_for('categories_edit', category_id=c.id) }}"
               class="btn btn-sm btn-outline-primary me-1">
              <i class="bi bi-pencil"></i> Editar
            </a>
            <form method="POST" action="{{ url_for('categories_delete', category_id=c.id) }}"
                  class="d-inline"
                  onsubmit="return confirm('¿Eliminar la categoría «{{ c.name }}»?')">
              <button type="submit" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
              </button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="2" class="text-center text-muted py-4">
            <i class="bi bi-grid fs-3 d-block mb-2"></i>
            No hay categorías registradas.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
